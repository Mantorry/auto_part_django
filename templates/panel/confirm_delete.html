{% extends 'base.html' %}
{% block title %}Удаление{% endblock %}
{% block content %}
<div class="page-header">
  <h2><i class="bi bi-trash3 me-2 text-danger"></i>Подтверждение удаления</h2>
</div>
<div class="card" style="max-width:480px">
  <div class="card-body p-4 text-center">
    <div style="font-size:3rem;color:var(--text-muted)" class="mb-3"><i class="bi bi-exclamation-triangle-fill text-warning"></i></div>
    <h5 class="mb-2">Вы уверены?</h5>
    <p class="text-muted mb-4">Вы хотите удалить <strong>{{ title }}</strong>: <strong>{{ obj }}</strong>?<br>Это действие нельзя отменить.</p>
    <form method="post" class="d-inline">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger px-4 me-2"><i class="bi bi-trash3 me-1"></i>Удалить</button>
    </form>
    <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">Отмена</a>
  </div>
</div>
{% endblock %}
