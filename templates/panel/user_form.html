{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="page-header">
  <h2><i class="bi bi-person-plus me-2" style="color:var(--accent)"></i>{{ title }}</h2>
  <a href="{% url 'panel:user_list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Назад</a>
</div>
<div class="card" style="max-width:560px">
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">ФИО <span class="text-danger">*</span></label>
        <input type="text" name="full_name" class="form-control" value="{{ obj.full_name|default:'' }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Логин <span class="text-danger">*</span></label>
        <input type="text" name="username" class="form-control" value="{{ obj.username|default:'' }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Пароль {% if not obj %}<span class="text-danger">*</span>{% else %}<span class="text-muted small">(оставьте пустым, если не меняете)</span>{% endif %}</label>
        <input type="password" name="password" class="form-control" {% if not obj %}required{% endif %}>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Роль</label>
        <select name="role" class="form-select">
          <option value="seller" {% if obj.role == 'seller' %}selected{% endif %}>Продавец</option>
          <option value="sorter" {% if obj.role == 'sorter' %}selected{% endif %}>Сортировщик</option>
          <option value="admin" {% if obj.role == 'admin' %}selected{% endif %}>Администратор</option>
        </select>
      </div>
      {% if obj %}
      <div class="mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="is_active" id="is_active" {% if obj.is_active %}checked{% endif %}>
          <label class="form-check-label" for="is_active">Активен</label>
        </div>
      </div>
      {% endif %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-accent px-4"><i class="bi bi-check-lg me-1"></i>Сохранить</button>
        <a href="{% url 'panel:user_list' %}" class="btn btn-outline-secondary">Отмена</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
