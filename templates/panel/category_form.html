{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="page-header">
  <h2><i class="bi bi-tag me-2" style="color:var(--accent)"></i>{{ title }}</h2>
  <a href="{% url 'panel:category_list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Назад</a>
</div>
<div class="card" style="max-width:480px">
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Название <span class="text-danger">*</span></label>
        <input type="text" name="name" class="form-control" value="{{ obj.name|default:'' }}" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Slug <span class="text-danger">*</span></label>
        <input type="text" name="slug" class="form-control" value="{{ obj.slug|default:'' }}" required placeholder="например: bmw">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-accent px-4">Сохранить</button>
        <a href="{% url 'panel:category_list' %}" class="btn btn-outline-secondary">Отмена</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
