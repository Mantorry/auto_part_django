{% extends 'base.html' %}
{% block title %}Новая поставка{% endblock %}
{% block content %}
<div class="page-header">
  <h2><i class="bi bi-truck me-2" style="color:var(--accent)"></i>Новая поставка</h2>
  <a href="{% url 'panel:supply_list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Назад</a>
</div>
<div class="card">
  <div class="card-body p-4">
    <form method="post" id="supplyForm">
      {% csrf_token %}
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label fw-semibold">Поставщик <span class="text-danger">*</span></label>
          <input type="text" name="supplier" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Примечание</label>
          <input type="text" name="note" class="form-control">
        </div>
      </div>
      <h6 class="fw-bold mb-3">Позиции поставки</h6>
      <div id="itemsContainer">
        <div class="row g-2 mb-2 supply-row align-items-end">
          <div class="col-md-5">
            <label class="form-label small">Товар</label>
            <select name="product" class="form-select">
              <option value="">— выберите —</option>
              {% for p in products %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label small">Количество</label>
            <input type="number" name="quantity" class="form-control" min="1" value="1">
          </div>
          <div class="col-md-3">
            <label class="form-label small">Цена закупки (₽)</label>
            <input type="number" name="cost_price" class="form-control" step="0.01" min="0">
          </div>
          <div class="col-md-1">
            <button type="button" class="btn btn-outline-danger btn-sm remove-row" style="margin-top:1.5rem"><i class="bi bi-x-lg"></i></button>
          </div>
        </div>
      </div>
      <button type="button" id="addRow" class="btn btn-outline-secondary btn-sm mt-2">
        <i class="bi bi-plus-lg me-1"></i>Добавить позицию
      </button>
      <div class="mt-4">
        <button type="submit" class="btn btn-accent px-4"><i class="bi bi-check-lg me-1"></i>Создать поставку</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
const template = document.querySelector('.supply-row').cloneNode(true);
document.getElementById('addRow').addEventListener('click', () => {
  const clone = template.cloneNode(true);
  clone.querySelectorAll('input').forEach(i => i.value = i.defaultValue || '');
  document.getElementById('itemsContainer').appendChild(clone);
});
document.getElementById('itemsContainer').addEventListener('click', e => {
  if (e.target.closest('.remove-row')) {
    const rows = document.querySelectorAll('.supply-row');
    if (rows.length > 1) e.target.closest('.supply-row').remove();
  }
});
</script>
{% endblock %}
