<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Вход — АвтоЗапчасти</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root { --accent: #7161ef; }
    body {
      background: #e8e8e4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(113,97,239,0.12);
    }
    .login-logo {
      width: 64px; height: 64px;
      background: #f0eeff;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: var(--accent);
      margin: 0 auto 16px;
    }
    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(113,97,239,0.15);
    }
    .btn-login {
      background: var(--accent);
      color: white;
      border: none;
      padding: 11px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 10px;
    }
    .btn-login:hover { background: #5a4dd4; color: white; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo"><i class="bi bi-gear-wide-connected"></i></div>
  <h4 class="text-center fw-bold mb-1">АвтоЗапчасти</h4>
  <p class="text-center text-muted mb-4" style="font-size:0.88rem">Система управления складом</p>
  {% for message in messages %}
  <div class="alert alert-danger py-2">{{ message }}</div>
  {% endfor %}
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-600">Логин</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" name="username" class="form-control" placeholder="Введите логин" required>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-600">Пароль</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" name="password" class="form-control" placeholder="Введите пароль" required>
      </div>
    </div>
    <button type="submit" class="btn btn-login w-100">Войти</button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
